# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

# Use container runtime for HTTP/SSE hosting
runtime: container

# Build configuration
build:
  dockerfile: Dockerfile
  dockerBuildPath: .

startCommand:
  type: http
  # HTTP-specific settings for Smithery hosting
  http:
    endpoint: "/sse"
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - mysqlUser
      - mysqlPassword
      - mysqlDatabase
    properties:
      mysqlHost:
        type: string
        description: "The hostname of the MySQL server. Use localhost for local connections or a specific address for remote databases. For Docker, host.docker.internal allows accessing the host machine."
        default: "host.docker.internal"
      mysqlPort:
        type: number
        description: "The port of the MySQL server (default: 3306)."
        default: 3306
      mysqlUser:
        type: string
        description: "The username for MySQL authentication."
      mysqlPassword:
        type: string
        description: "The password for MySQL authentication."
      mysqlDatabase:
        type: string
        description: "The database to connect to."
  commandFunction:
    # A function that produces the CLI command to start the MCP on HTTP/SSE.
    |-
    (config) => ({ 
      command: 'python', 
      args: ['-m', 'mysql_mcp_server.server'],
      env: {
        MCP_TRANSPORT: 'sse',
        MYSQL_HOST: config.mysqlHost,
        MYSQL_PORT: config.mysqlPort.toString(),
        MYSQL_USER: config.mysqlUser,
        MYSQL_PASSWORD: config.mysqlPassword,
        MYSQL_DATABASE: config.mysqlDatabase
      }
    })
